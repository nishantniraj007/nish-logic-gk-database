name: Daily 500 Headless DB Generation

on:
  schedule:
    # 22:00 UTC corresponds to 3:30 AM IST. Perfectly timed after your 180-Question hybrid completes.
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  generate-500-questions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Formulate 500 Questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/autonomous_gen.js

      - name: Commit Daily Delta
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/ geography/ polity/ data/hash_set.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-Ingest: Added latest Gemini Flash-Lite 500 DB Block [skip ci]"
            git pull --rebase origin master
            git push
          else
            echo "No changes tracked."
          fi
